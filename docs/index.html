用藥(neoadjuvant therapy)，並於手術後繼續單獨使用作為輔助治療用藥(adjuvant therapy)。 (２)作為單一療法，治療患有局部晚期、無法手術切除的非小細胞肺癌，且接受放射治療合併含鉑化療後病情未惡化的病人。 ２、小細胞肺癌： (１)作為單一療法，治療患有侷限期小細胞肺癌(LS-SCLC)，且接受同步含鉑化療及放射治療(cCRT)後病情未惡化的成人病人。 (２)併用etoposide以及carboplatin或cisplatin兩者之一，適用於擴散期小細胞肺癌(ES-SCLC)病人的第一線治療。 ３、膽道癌：與cisplatin及gemcitabine併用於治療局部晚期或轉移性膽道癌(biliary tract cancer)之成人病人。 ４、肝細胞癌：與tremelimumab 併用，適用於治療未曾接受全身性療法之晚期或無法切除之肝細胞癌成人病人。 ５、子宮內膜癌：適用於可接受全身性治療的原發性晚期或復發性子宮內膜癌成人病人之第一線治療，與含鉑化療合併治療後，若未惡化的病人接續以下維持治療： - 單一療法用於錯配修復功能缺陷( Mismatch Repair Deficient, dMMR)的子宮內膜癌病人。 - 併用Olaparib用於錯配修復功能正常(Mismatch Repair Proficient, pMMR)的子宮內膜癌病人。 ６、膀胱癌：與gemcitabine及cisplatin併用，作為成人可切除之肌肉層侵犯型膀胱癌的前導性治療用藥(neoadjuvant therapy)，並於根除性膀胱切除術後，繼續單獨使用作為輔助治療用藥(adjuvant therapy)。７、胃腺癌或胃食道接合處腺癌：與fluorouracil、leucovorin、oxaliplatin 和docetaxel (FLOT)併用，作為可手術切除的胃腺癌或胃食道接合處(GEJ)腺癌成人病人的前導性治療用藥(neoadjuvant therapy)及術後輔助治療用藥(adjuvant therapy)，並作為單一療法接續使用。\", \"dosage\": \"請參閱仿單內容\", \"dosage_form\": \"注射劑\", \"effective_until\": \"2028/10/11\", \"raw_ingredients\": [\"Durvalumab\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"NSCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"１、非小細胞肺癌(NSCLC)： (１)與含鉑化療藥物併用，作為可切除(腫瘤大小>4公分且/或(and/or)淋巴結分期N1及N2)、無已知的表皮生長因子受體(EGFR)突變或間變性淋巴瘤激酶(ALK)重組的非小細胞肺癌成人病人的前導性治療用藥(neoadjuvant therapy)，並於手術後繼續單獨使用作為輔助治療用藥(adjuvant therapy)\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"１、非小細胞肺癌(NSCLC)： (１)與含鉑化療藥物併用，作為可切除(腫瘤大小>4公分且/或(and/or)淋巴結分期N1及N2)、無已知的表皮生長因子受體(EGFR)突變或間變性淋巴瘤激酶(ALK)重組的非小細胞肺癌成人病人的前導性治療用藥(neoadjuvant therapy)，並於手術後繼續單獨使用作為輔助治療用藥(adjuvant therapy)\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \" 8175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(２)併用etoposide以及carboplatin或cisplatin兩者之一，適用於擴散期小細胞肺癌(ES-SCLC)病人的第一線治療\"}]}] 抑癌寧注射劑 IMFINZI Injection 50 mg/ml KC01088229"}, {"key": "IPILIMUMAB", "text": "IPILIMUMAB IPILIMUMAB [\"YERVOY\"] [{\"permit\": \"衛部菌疫輸字第000958號\", \"chinese_name\": \"益伏注射劑 5毫克/毫升\", \"english_name\": \"YERVOY (ipilimumab) Injection 5mg/mL\", \"indication\": \"1.無法切除或轉移性黑色素瘤：併用 nivolumab 適用於治療無法切除或轉移性黑色素瘤之12歲以上病人。  \\n2.晚期腎細胞癌：併用 nivolumab 適用於中度/重度風險 (intermediate /poor risk) 晚期腎細胞癌 (RCC)成人病人的第一線治療。  \\n3.高度微衛星不穩定性(MSI-H)或錯誤配對修復缺陷(dMMR)的轉移性大腸直腸癌：併用nivolumab適用於無法手術切除或轉移性高度微衛星不穩定性(MSI-H)或錯誤配對修復缺陷(dMMR)的大腸直腸癌(CRC)成人病人。\\n4.肝細胞癌：(1) 併用nivolumab 適用於無法切除或轉移性的肝細胞癌 (HCC)成人病人的第一線治療。(2) 併用 nivolumab 適用於治療先前曾接受sorafenib治療的肝細胞癌 (HCC) 成人病人。\\n5.轉移性或復發性非小細胞肺癌：(1)併用 nivolumab 適用於帶有PD-L1(≧1%)且不具EGFR或ALK腫瘤基因異常的成年轉移性或復發性非小細胞肺癌(NSCLC)病人的第一線治療。  (2) 併用 nivolumab 及2個週期含鉑化學治療適用於不具EGFR或ALK腫瘤基因異常的成年轉移性或復發性非小細胞肺癌(NSCLC)病人的第一線治療。  \\n6.惡性肋膜間皮瘤：併用 nivolumab 適用於無法切除之惡性肋膜間皮瘤成人病人的第一線治療。  \\n7.食道癌：併用 nivolumab 適用於晚期或轉移性食道鱗狀細胞癌 (ESCC) 成人病人的第一線治療。\", \"dosage\": \"詳如仿單。\", \"dosage_form\": \"注射液劑\", \"effective_until\": \"2029/08/18\", \"raw_ingredients\": [\"Ipilimumab\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"NSCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"5.轉移性或復發性非小細胞肺癌：(1)併用 nivolumab 適用於帶有PD-L1(≧1%)且不具EGFR或ALK腫瘤基因異常的成年轉移性或復發性非小細胞肺癌(NSCLC)病人的第一線治療\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"5.轉移性或復發性非小細胞肺癌：(1)併用 nivolumab 適用於帶有PD-L1(≧1%)且不具EGFR或ALK腫瘤基因異常的成年轉移性或復發性非小細胞肺癌(NSCLC)病人的第一線治療\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D0 助性治療後12個月內出現疾病惡化現象的局部晚期或轉移性泌尿道上皮癌病人。 單獨使用，治療不適合接受任何含鉑化學療法的局部晚期或轉移性泌尿道上皮癌病人。 單獨使用，治療有原位癌(CIS)，有或沒有乳頭狀腫瘤，且不適合進行或決定不進行膀胱切除術的卡介苗(BCG)無反應性、高危險、非肌肉侵犯性膀胱癌(NMIBC)病人。 7.胃癌： 與fluoropyrimidine及含鉑化學療法併用，做為局部晚期無法切除或轉移性之HER2陰性胃腺癌(adenocarcinoma)或胃食道接合部(gastroesophageal junction,GEJ)腺癌成年病人的第一線治療藥物。 與trastuzumab、fluoropyrimidine及含鉑化學療法併用，做為經確效之試驗檢測出腫瘤有PD-L1表現[綜合陽性分數(CPS) ≥1]之局部晚期無法切除或轉移性之HER2陽性胃腺癌或胃食道接合部(GEJ)腺癌病人的第一線治療藥物。 8.原發性縱膈腔B細胞淋巴瘤： 治療罹患頑固性或先前至少已接受兩種治療仍復發之原發性縱膈腔B細胞淋巴瘤的成人及兒童病人。 9.高微衛星不穩定性(microsatellite instability high; MSI-H)或錯誤配對修復功能不足性(mismatch repair deficient; dMMR)癌症： 治療患有無法切除或轉移性高微衛星不穩定性(MSI-H)或錯誤配對修復功能不足(dMMR)之下列癌症的成人病人。 使用fluoropyrimidine, oxaliplatin及irinotecan治療後出現惡化現象的大腸直腸癌，或於先前治療後出現惡化現象且無任何其他適當之替代治療選擇的實體腫瘤。 10.高微衛星不穩定性或錯誤配對修復功能不足性大腸直腸癌： 做為無法切除或轉移性高微衛星不穩定性(MSI-H)或錯誤配對修復功能不足(dMMR)大腸直腸癌(CRC)病人的第一線治療藥物。 11.肝細胞癌： 治療先前經sorafenib治療的肝細胞癌 (HCC)病人。 12.膽管癌(Biliary Tract Carcinoma)： 與gemcitabine 及cisplatin 併用，治療患有局部晚期無法切除或轉移性之膽管癌（BTC）的病人。 13.子宮頸癌： 與同步化學放射療法併用，治療高復發風險之局部晚期子宮頸癌病人。 與化學療法併用，合併或不合併bevacizumab，治療經確效之試驗檢測出腫瘤有PD-L1表現(CPS>=1)的持續性、復發或轉移性子宮頸癌病人。 單獨使用，治療經確效之試驗檢測出腫瘤有PD-L1表現 (CPS≥1)，且在接受化學治療期間或治療後出現疾病惡化現 象的復發或轉移性子宮頸癌病人。 14.腎細胞癌： 與axitinib併用，做為晚期腎細胞癌病人的第一線治療藥物。 與lenvatinib併用，做為晚期腎細胞癌病人的第一線治療藥物。做為中高或高復發風險腎細胞癌成人病人在腎切除術後或腎臟及轉移病灶切除後的輔助治療。 15.子宮內膜癌： 與carboplatin 及paclitaxel 併用，隨後作為單一療法，治療原發性晚期或復發性子宮內膜癌病人。 與lenvatinib併用適用於曾經以任何形式接受過全身性治療後疾病惡化，且不適合根治手術或放射治療之晚期子宮內膜癌病人。 16.食道癌： 與含鉑及fluoropyrimidine之化學療法併用，做為局部晚期無法切除或轉移性食道癌或胃食道接合部癌病人的第一線治療藥物。 作為單一療法，治療患有復發性局部晚期或轉移性食道鱗狀細胞癌，經確效之試驗檢測出腫瘤有PD-L1表現(綜合陽性分數[CPS]≥10)，且先前曾接受一種(含)以上全身性治療，於治療時或治療後發生疾病惡化的病人。 17.三陰性乳癌(Triple Negative Breast Cancer)： 與化學療法併用，做為高風險早期三陰性乳癌 (TNBC) 病人的前導性治療用藥，並於手術後繼續單獨使用做為輔助治療用藥。 與化學療法併用，治療局部復發性無法切除或轉移性之三陰性乳癌(TNBC)，且經確效之試驗檢測出腫瘤有PD-L1表現(綜合陽性分數[CPS]≥10)病人。 18.高腫瘤突變負荷量(Tumor Mutational Burden-High; TMB-H)癌症： 治療患有無法切除或轉移性、經確效之試驗檢測出高腫瘤突變負荷量(tumor mutation burden high [TMB-H]) [≥10 mutations / megabase (mut/Mb)]、於先前治療後出現惡化現象且無任何其他適當替代治療選擇之實體腫瘤的成人病人。\", \"dosage\": \"詳如電子仿單核定本\", \"dosage_form\": \"注射劑\", \"effective_until\": efractory eosinophilic asthma)之6歲以上病人之附加維持治療。\\n２.慢性鼻竇炎合併鼻息肉之維持治療：患有慢性鼻竇炎合併鼻息肉[chronic rhinosinusitis with nasal polyps (CRSwNP)]且使用鼻腔內類固醇仍控制不良之成年病人的附加維持治療。\\n３.嗜伊紅性肉芽腫併多發性血管炎：治療嗜伊紅性肉芽腫併多發性血管炎[eosinophilic granulomatosis with polyangiitis (EGPA)]之成人病人。\\n４.嗜伊紅性白血球增多症候群(HES)：患有嗜伊紅性白血球增多症候群(hypereosinophilic syndrome)之成年病人的附加治療。\\n５.嗜伊紅性白血球表現型慢性阻塞性肺病(COPD) 之維持治療：患有控制不佳之嗜伊紅性白血球表現型慢性阻塞性肺病[chronic obstructive pulmonary disease (COPD)]成人病人的附加維持治療(add-on maintenance therapy)。\\n使用限制：NUCALA不可使用於緩解急性支氣管痙攣\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"預充填式注射劑\", \"effective_until\": \"2030/11/13\", \"raw_ingredients\": [\"Mepolizumab\"], \"topics\": [\"呼吸道藥物\"], \"topic_evidence\": [{\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"asthma\", \"match_kind\": \"direct_indication\", \"source_text\": \"嚴重氣喘之維持治療：表現型為嗜伊紅性白血球的嚴重氣喘且控制不良(severe refractory eosinophilic asthma)之6歲以上病人之附加維持治療\"}, {\"concept_id\": \"copd\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Chronic Obstructive Pulmonary Disease\", \"mesh_id\": \"D029424\", \"matched_term\": \"COPD\", \"match_kind\": \"direct_indication\", \"source_text\": \"５.嗜伊紅性白血球表現型慢性阻塞性肺病(COPD) 之維持治療：患有控制不佳之嗜伊紅性白血球表現型慢性阻塞性肺病[chronic obstructive pulmonary disease (COPD)]成人病人的附加維持治療(add-on maintenance therapy)\"}]}] 舒肺樂凍晶注射劑 Nucala Powder for Solution for Injection KC01015255 舒肺樂注射劑100毫克/毫升 NUCALA SOLUTION FOR INJECTION 100MG/ML KC01144209 舒肺樂注射劑40毫克/0.4毫升 NUCALA SOLUTION FOR INJECTION 40MG/0.4ML KC011442CR"}, {"key": "CRIZOTINIB", "text": "CRIZOTINIB CRIZOTINIB [\"Xalkori\"] [{\"permit\": \"衛署藥輸字第025938號\", \"chinese_name\": \"截剋瘤膠囊250毫克\", \"english_name\": \"XALKORI Capsules 250mg\", \"indication\": \"１、治療ALK陽性的晚期非小細胞肺癌病人。治療前須經衛福部核准之檢驗方式測得ALK陽性。\\n２、XALKORI 適用於治療 ROS-1 陽性的晚期非小細胞肺癌(NSCLC) 病人。\\n３、適用於治療患有 ALK 陽性之復發性或頑固性、全身性退行分化型大細胞淋巴瘤(ALCL) 的1歲以上兒童、青少年及年輕成人病人。\\n說明：尚未確定 XALKORI對於患有復發性或頑固性、全身性ALK陽性ALCL之21歲以上成人的安全性和療效。\\n４、適用於治療患有無法切除、復發性或頑固性發炎性肌纖維母細胞瘤 (IMT)且ALK陽性的1歲 s\": [\"BETAMETHASONE ACETATE;;BETAMETHASONE SODIUM PHOSPHATE\"], \"topics\": [\"呼吸道藥物\"], \"topic_evidence\": [{\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"慢性關節、僂麻質斯、變形性關節症（骨關節炎）關節周圍炎、肌肉僂麻質斯、腱鞘炎、腱炎、腱周圍炎、滑液囊炎、神經痛、支氣管氣喘、圓形脫毛症\"}]}, {\"permit\": \"衛署藥製字第018669號\", \"chinese_name\": \"具他每松懸濁注射液\", \"english_name\": \"BETAMETHASONE SUSPENDED INJECTION \\\"GENTLE\\\"\", \"indication\": \"風濕性關節炎、支氣管氣喘、過敏性鼻炎、枯草熱、蕁麻疹、散佈性紅斑性狼瘡、濕疹、過敏性皮膚炎、過敏性鼻炎\", \"dosage\": \"\", \"dosage_form\": \"滅菌懸液注射劑\", \"effective_until\": \"2029/09/10\", \"raw_ingredients\": [\"BETAMETHASONE ACETATE;;BETAMETHASONE (SODIUM PHOSPHATE)\"], \"topics\": [\"呼吸道藥物\"], \"topic_evidence\": [{\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"風濕性關節炎、支氣管氣喘、過敏性鼻炎、枯草熱、蕁麻疹、散佈性紅斑性狼瘡、濕疹、過敏性皮膚炎、過敏性鼻炎\"}]}]"}, {"key": "OLODATEROL RESPIMAT", "text": "OLODATEROL RESPIMAT OLODATEROL RESPIMAT INHALATION SPRAY [\"Striverdi Respimat\"] "}, {"key": "ARFORMOTEROL TARTRATE", "text": "ARFORMOTEROL TARTRATE ARFORMOTEROL TARTRATE [\"Arformoterol Tartrate\", \"Arformoterol Tartrate Inhalation\", \"Arformoterol Tartrate Inhalation Solution\", \"Arformoterol tartrate\", \"arformoterol tartrate\"] "}, {"key": "NIVOLUMAB", "text": "NIVOLUMAB NIVOLUMAB [\"OPDIVO\"] [{\"permit\": \"衛部菌疫輸字第001013號\", \"chinese_name\": \"保疾伏\", \"english_name\": \"OPDIVO (nivolumab) Injection 10mg/mL\", \"indication\": \"１、無法切除或轉移性黑色素瘤：單一療法或併用ipilimumab適用於治療無法切除或轉移性黑色素瘤病人。\\n２、黑色素瘤之輔助治療：適用於黑色素瘤侵犯至淋巴結或已轉移且曾進行完全切除性手術之病人的輔助治療。\\n３、可切除之非小細胞肺癌的術前輔助治療：併用含鉑化學治療適用於可切除（腫瘤≧4公分或淋巴結陽性）且不具EGFR或ALK腫瘤基因異常之非小細胞肺癌(NSCLC)成年病人的術前輔助治療。\\n４、非小細胞肺癌：(1)併用ipilimumab適用於帶有PD-L1 (≧1%)且不具EGFR或ALK腫瘤基因異常的轉移性或復發性非小細胞肺癌(NSCLC)成年病人的第一線治療。(2)併用ipilimumab及2個週期含鉑化學治療適用於不具EGFR或ALK腫瘤基因異常的轉移性或復發性非小細胞肺癌(NSCLC)成年病人的第一線治療。(3)併用 carboplatin、paclitaxel及 bevacizumab適用於不具EGFR或 ALK腫瘤基因異常的轉移性或復發性非鱗狀非小細胞肺癌(non-squamous NSCLC) 成年病人的第一線治療。(4)適用於接受含鉑化學治療時或之後疾病惡化的晚期非小細胞肺癌(NSCLC)病人，病人若具有EGFR或ALK腫瘤基因異常者，則須經EGFR或ALK抑制劑治療後出現疾病惡化現象。\\n５、惡性肋膜間皮瘤：併用ipilimumab適用於無法切除之惡性肋膜間皮瘤成人病人的第一線治療。\\n６、腎細胞癌：(1)適用於先前經抗血管新生療法治療(anti-angiogenic therapy)的晚期腎細胞癌病人。(2)併用ipilimumab可用於治療中度/重度風險(intermediate/poor-risk)先前未曾接受治療的晚期腎細胞癌病人。(3)併用cabozantinib適用於未曾接受治療的晚期腎細胞癌病人。\\n７、頭頸部鱗狀細胞癌：適用於接受含鉑化學治療時或之後疾病惡化的復發或轉移性頭頸部鱗狀細胞癌(SCCHN)病人。\\n８、典型何杰金氏淋巴瘤：適用於經下列方式治療後復發或惡化的典型何杰金氏淋巴瘤成人病人：(1)接受自體造血幹細胞移植(HSCT)與brentuximab vedotin，或(2)接受3種或3種以上全身性療法，包括自體造血幹細胞移植(HSCT)。\\n本項適應症係依據客觀反應率(objective response rate)獲得加速核准。適應症的持續核准須要後續確認性試驗(confirmatory trial)證明確實達到臨床效益。\\n９、泌尿道上皮癌：(1)併用cisplatin和gemcitabine適用於無法切除或轉移性泌尿道上皮癌成人病人的第一線治療。(2)適用於治療接受含鉑療法期間或之後惡化的局部晚期無法切除或轉移性泌尿道上皮癌病人。本項適應症係依據腫瘤反應率(tumor response rate)及治療反應持續時間(duration of response)獲得加速核准。適應症的持續核准須要後續確認性試驗(confirmatory trial)證明確實達到臨床效益。(3)適用於在接受根治性切除術後，有高度復發風險的泌尿道上皮癌病人輔助治療。\\n１０、胃癌、胃食道癌或食道腺癌：(1)併用fluoropyrimidine及含鉑化學治療適用於治療晚期或轉移性，且不具有HER2過度表現的胃癌或胃食道癌(Gastroesophageal Junction, GEJ)或食道腺癌的病人。(2)適用於治療先前經兩種或兩種以上化學治療的晚期或復發性胃癌或胃食道癌的病人。\\n１１、肝細胞癌：(1) 併用ipilimumab適用於無法切除或轉移性的肝細胞癌(HCC)成人病人的第一線治療。(2) 併用ipilimumab適用於治療先前曾接受sorafenib治療的肝細胞癌(HCC)成人病人。\\n１２、轉移性大腸直腸癌：(1)併用ipilimumab適用於無法手術切除或轉移性高度微衛星不穩定性(MSI-H)或錯誤配對修復缺陷(dMMR)的大腸直腸癌(CRC)成人病人。(2)單一藥物適用於接受fluoropyrimidine、oxaliplatin和irinotecan治療後疾病惡化之轉移性高度微衛星不穩定性(MSI-H)或錯誤配對修復缺陷(dMMR)的大腸直腸癌(CRC)成人病人。\\n１３、食道鱗狀細胞癌：(1)併用含fluoropyrimidine及含鉑的化學治療適用於晚期或轉移性食道鱗狀細胞癌(ESCC)病人的第一線治療。(2)併用ipilimumab適用於晚期或轉移性食道鱗狀細胞癌(ESCC)病人的第一線治療。(3)適用於曾接受合併含鉑及fluoropyrimidine 化學治療之後惡化的無法切除晚期或復發性食道鱗狀細胞癌(esophageal squamous cell carcinoma)病人。\\n１４、食道癌或胃食道癌切除的輔助治療：適用於曾接受術前同步化學與放射治療(neoadjuvant concurrent chemoradiotherapy)與手術完全切除，經病理檢查確認切除組織仍殘留腫瘤之食道癌或胃食道癌病人的輔助治療。\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"注射劑\", \"effective_until\": \"2031/03/04\", \"raw_ingredients\": [\"Nivolumab\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \" \", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"乳癌、非小細胞肺癌、前列腺癌、頭頸癌\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"乳癌、非小細胞肺癌、前列腺癌、頭頸癌\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"乳癌、非小細胞肺癌、前列腺癌、頭頸癌\"}]}, {\"permit\": \"衛署藥製字第057240號\", \"chinese_name\": \"鈦能注射劑\", \"english_name\": \"Tynen Injection\", \"indication\": \"１、乳癌\\n- 與doxorubicin和cyclophosphamide併用適用於可手術切除具有淋巴結轉移及無淋巴結轉移的乳癌病人的術後輔助療法。對於可接受手術切除且無淋巴結轉移的乳癌病人，輔助療法僅限用於可接受化學治療的病人，該化療方式則是遵照國際標準對早期乳癌之主要治療方式。\\n- 與doxorubicin併用適用局部晚期或轉移性乳癌且先前未曾接受過化學治療之病人。\\n- 單獨使用，適用於治療局部晚期或轉移性且先前化學治療失敗之乳癌病人。\\n- 與trastuzumab併用，可用於治療腫瘤HER2過度表現且先前未曾接受過化學治療的轉移性乳癌病人。\\n- 與capecitabine併用於治療對先前化學治療(包括anthracycline)無效之局部晚期或轉移性乳癌病人。\\n２、非小細胞肺癌\\n- 與cisplatin併用適用於局部晚期或轉移性非小細胞肺癌，且先前未曾接受過化學治療之病人。Docetaxel與carboplatin併用為另一含鉑之治療選擇。\\n- 適用於對先前接受含鉑化學治療失敗的局部晚期或轉移性之非小細胞肺癌。\\n３、前列腺癌\\n- 與prednisone或prednisolone併用適用於荷爾蒙治療無效之轉移性前列腺癌。\\n- 與雄激素去除療法(ADT)併用 (不論是否併用prednisone或prednisolone)適用於荷爾蒙治療敏感性之轉移性前列腺癌。\\n４、胃腺癌\\n- 與oxaliplatin、leucovorin及5-fluorouracil (FLOT)併用適用於局部晚期胃腺癌(LAGC) (包括胃食道接合處之腺癌)病人的手術期間治療。\\n- 與S-1併用適用於可手術切除、病理分期Stage III的LAGC(包括胃食道接合處之腺癌)病人之術後輔助治療。\\n- 與cisplatin及5-fluorouracil併用適用於先前未曾接受過化學治療的晚期胃腺癌 (包括胃食道接合處之腺癌)病人。\\n- 單藥治療適用於接受第一線全身性治療失敗後的晚期 (無法以手術切除) 胃腺癌 (包括胃食道接合處之腺癌) 病人。\\n５、頭頸癌\\n- 與cisplatin及5-fluorouracil併用適用於頭頸部局部進行性鱗狀細胞癌病人放射治療前的引導性化療。\", \"dosage\": \"詳見仿單[用法用量]\", \"dosage_form\": \"注射液\", \"effective_until\": \"2027/06/04\", \"raw_ingredients\": [\"DOCETAXEL ANHYDROUS\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\ 腺癌)病人的手術期間治療。\\r\\n- 與S-1併用適用於可手術切除、病理分期Stage III的LAGC(包括胃食道接合處之腺癌)病人之術後輔助治療。\\r\\n- 與cisplatin及5-fluorouracil併用適用於先前未曾接受過化學治療的晚期胃腺癌 (包括胃食道接合處之腺癌)病人。\\r\\n- 單藥治療適用於接受第一線全身性治療失敗後的晚期 (無法以手術切除) 胃腺癌 (包括胃食道接合處之腺癌) 病人。\\r\\n５、頭頸癌\\r\\n- 與cisplatin及5-fluorouracil併用適用於頭頸部局部進行性鱗狀細胞癌病人放射治療前的引導性化療。\", \"dosage\": \"詳如仿單\", \"dosage_form\": \"注射劑\", \"effective_until\": \"2030/11/17\", \"raw_ingredients\": [\"DOCETAXEL\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"２、非小細胞肺癌\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"２、非小細胞肺癌\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"２、非小細胞肺癌\"}, {\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"- 與cisplatin併用適用於局部晚期或轉移性非小細胞肺癌，且先前未曾接受過化學治療之病人\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"- 與cisplatin併用適用於局部晚期或轉移性非小細胞肺癌，且先前未曾接受過化學治療之病人\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"- 與cisplatin併用適用於局部晚期或轉移性非小細胞肺癌，且先前未曾接受過化學治療之病人\"}, {\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \" 要治療方式（詳見 10.2藥效藥理特性）。\\n\\n1. Docetaxel 與 doxorubicin 併用適用局部晚期或轉移性乳癌且先前未曾接受過化學治療之病人。\\n\\n2. Docetaxel 單獨使用，適用於治療局部晚期或轉移性且先前化學治療失敗之乳癌病人。\\n\\n3. Docetaxel 與 trastuzumab 併用，可用於治療腫瘤HER2 過度表現且先前未曾接受過化學治療的轉移性乳癌病人。\\n\\n4. Docetaxel 與 capecitabine 併用於治療對化學治療（包括 anthracycline）無效之局部晚期或轉移性乳癌病人。\\n\\n(二)非小細胞肺癌\\n\\n1. Docetaxel 與 cisplatin 併用適用於局部晚期或轉移性非小細胞肺癌，且先前未曾接受過化學治療之病人。Docetaxel 與 carboplatin 併用為另一含鉑之治療選擇。\\n\\n2. Docetaxel 適用於對含鉑之化學療法治療失敗的局部晚期或轉移性之非小細胞肺癌。\\n\\n(三)前列腺癌\\n\\n1. Docetaxel 與 prednisone 或 prednisolone 併用適用於荷爾蒙治療無效之轉移性前列腺癌。\\n\\n2. 與雄激素去除療法（ADT）併用（不論是否併用prednisone 或 prednisolone）適用於荷爾蒙治療敏感性之轉移性前列腺癌。\\n\\n(四)胃腺癌\\n\\n1. 與 oxaliplatin、leucovorin 及 5-fluorouracil（FLOT 併用適用於局部晚期胃腺癌（LAGC）（包括胃食道接合處\\n\\n之腺癌）病人的手術期間治療。\\n\\n2. 與 S-1 併用適用於可手術切除、病理分期 Stage III 的LAGC（包括胃食道接合處之腺癌）病人之術後輔助治\\n\\n療。\\n\\n3. 與 cisplatin 及 5-fluorouracil 併用適用於先前未曾接受過化學治療的晚期胃腺癌（包括胃食道接合處之腺癌）病人。\\n\\n4. 單藥治療適用於接受第一線全身性治療失敗後的晚期（無法以手術切除）胃腺癌（包括胃食道接合處之腺癌）病人。\\n\\n(五)頭頸癌\\n\\nDocetaxel 與 cisplatin 及 5-fluorouracil 併用適用於頭頸部局部進行性鱗狀細胞癌病人放射治療前的引導性化療。\", \"dosage\": \"請詳見仿單\", \"dosage_form\": \"注射劑\", \"effective_until\": \"2028/08/30\", \"raw_ingredients\": [\"DOCETAXEL\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(二)非小細胞肺癌\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(二)非小細胞肺癌\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(二)非小細胞肺癌\"}, {\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched tch_kind\": \"direct_indication\", \"source_text\": \"抗氣喘劑\"}]}]"}, {"key": "BUPIVACAINE + DEXAMETHASONE PHOSPHATE + POVIDINE IODINE", "text": "BUPIVACAINE + DEXAMETHASONE PHOSPHATE + POVIDINE IODINE DEXAMETHASONE SODIUM PHOSPHATE, BUPIVACAINE HYDROCHLORIDE, POVIDINE IODINE [\"Mardex 25 Kit\"] "}, {"key": "METHYLPREDNISOLONE SODIUM SUCCINATE BUFFERED", "text": "METHYLPREDNISOLONE SODIUM SUCCINATE BUFFERED   [{\"permit\": \"衛署藥製字第029085號\", \"chinese_name\": \"命得生注射劑\", \"english_name\": \"MEDASON FOR INJECTION\", \"indication\": \"腎上腺機能不全、劇烈休克、支氣管性氣喘、膠原疾病、過敏反應、泛發性感染\", \"dosage\": \"當需要用大劑量療法時，methylprednisolone的推薦劑量是30mg/kg，靜脈注射以10至20分鐘施行，此劑量可於48小時內，每4至6小時重覆一次。開始使用時，以一到數分鐘之時間，靜脈投與methylprednisolone。一般使用高劑量類固醇時，務必等到病人情況穩定後才能停藥，通常不超過48至72小時。雖然短時間使用大量類固醇不常發生副作用，偶而也會發生胃潰瘍。因此，常配合抗酸劑作為預防療法。至於其他適應症之第一次劑量可自10mg至40mg，依據病情而決定之。當病情危急時，可於短期間使用較大劑量，初次劑量應於一至數分鐘內施行靜脈注射；第二次以後，可以按照病人之病情及反應給與靜脈或肌肉注射。類固醇只是一種輔助治療劑，不能用來取代傳統之療法。嬰兒及兒童的劑量可以酌略減輕，然應以患者病情的嚴重性及其反應，而非年齡大小和體重多寡為主要考慮方向。每24小時每公斤體重的用量不得低於0.5mg。使用數天後，應該停藥或逐漸減輕用量。慢性病病情減輕期間，須停用本藥。在長期治療期間應作定期之例行檢驗：例如尿液分析，\", \"dosage_form\": \"乾粉注射劑\", \"effective_until\": \"2028/08/06\", \"raw_ingredients\": [\"METHYLPREDNISOLONE SODIUM SUCCINATE BUFFERED 3%\"], \"topics\": [\"呼吸道藥物\"], \"topic_evidence\": [{\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"腎上腺機能不全、劇烈休克、支氣管性氣喘、膠原疾病、過敏反應、泛發性感染\"}]}]"}, {"key": "TRIAMCINOLONE ACETONIDE", "text": "TRIAMCINOLONE ACETONIDE TRIAMCINOLONE ACETONIDE [\"KENALOG-40\", \"KENALOG-80\", \"TRIAMCINOLONE ACETONIDE\", \"Triamcinolone Acetonide\", \"Triamcinolone acetonide\", \"Triloan II SUIK\", \"Triloan SUIK\"] [{\"permit\": \"衛署藥製字第003386號\", \"chinese_name\": \"\\\"東洲\\\" 歐力克特肌肉注射液\", \"english_name\": \"ORICORT-IM INJECTION \\\"ORIENTAL\\\"\", \"indication\": \"風濕性關節炎、變形性關節炎、滑液囊炎、腱炎、皮膚炎、支氣管氣喘、天疱瘡、過敏性及發炎性眼科疾患、肉芽腫\", \"dosage\": \"\", \"dosage_form\": \"注射劑\", \"effective_u ", \"source_text\": \"單一療法適用於治療曾接受過至少一次全身性療法，且帶有KRAS G12C突變之局部晚期或轉移性非小細胞肺癌(NSCLC)成人病人\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"單一療法適用於治療曾接受過至少一次全身性療法，且帶有KRAS G12C突變之局部晚期或轉移性非小細胞肺癌(NSCLC)成人病人\"}]}, {\"permit\": \"衛部藥輸字第029167號\", \"chinese_name\": \"洛滿舒膜衣錠240毫克\", \"english_name\": \"LUMAKRAS Film-coated Tablets 240 mg\", \"indication\": \"單一療法適用於治療曾接受過至少一次全身性療法，且帶有KRAS G12C突變之局部晚期或轉移性非小細胞肺癌(NSCLC)成人病人。\\n併用panitumumab適用於治療先前接受過含有fluoropyrimidine、oxaliplatin與irinotecan之化學療法的KRAS G12C突變轉移性大腸直腸癌(mCRC)成人病人。\", \"dosage\": \"詳如仿單\", \"dosage_form\": \"膜衣錠\", \"effective_until\": \"2031/06/11\", \"raw_ingredients\": [\"Sotorasib\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"NSCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"單一療法適用於治療曾接受過至少一次全身性療法，且帶有KRAS G12C突變之局部晚期或轉移性非小細胞肺癌(NSCLC)成人病人\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"單一療法適用於治療曾接受過至少一次全身性療法，且帶有KRAS G12C突變之局部晚期或轉移性非小細胞肺癌(NSCLC)成人病人\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"單一療法適用於治療曾接受過至少一次全身性療法，且帶有KRAS G12C突變之局部晚期或轉移性非小細胞肺癌(NSCLC)成人病人\"}]}]"}, {"key": "ATEZOLIZUMAB", "text": "ATEZOLIZUMAB ATEZOLIZUMAB [\"TECENTRIQ\"] [{\"permit\": \"衛部菌疫輸字第001050號\", \"chinese_name\": \"癌自禦 注射劑\", \"english_name\": \"Tecentriq\", \"indication\": \"1. 非小細胞肺癌：\\n(1) 單獨使用，適用於第II至IIIA期(UICC/AJCC分期系統第7版)且腫瘤具PD-L1表現(tumor cell (TC) ≥ 1%)之非小細胞肺癌病人接受手術切除及含鉑藥物化學治療後的輔助性治療。\\n(2) 單獨使用，適用於治療接受含鉑化學治療後，疾病惡化之局部晚期或轉移性非小細胞肺癌病人。病人若具有EGFR或ALK腫瘤基因異常，則須先經EGFR或ALK抑制劑治療，若治療後疾病惡化方可使用本品。\\n(3) 與bevacizumab、paclitaxel和carboplatin併用，做為轉移性之非鱗狀非小細胞肺癌的第一線治療藥物。病人若具有 EGFR 突變或 ALK 呈陽性者，則須先經適當的標靶藥物治療，若治療後疾病惡化方可與bevacizumab、paclitaxel 和carboplatin併用治療。\\n(4) 與nab-paclitaxel和carboplatin併用，做為轉移性，不具EGFR或ALK腫瘤基因異常之非鱗狀非小細胞肺癌的第一線治療。\\n(5) 單獨使用，適用於第一線治療成人之轉移性、不具有EGFR或ALK腫瘤基因異常，且腫瘤具PD-L1高表現(tumor cells (TC) ≥ 50%或tumor infiltrating immune cells (IC) ≥10%)之非小細胞肺癌。\\n(6) 單獨使用，適用於第一線治療不具有EGFR 或ALK 腫瘤基因異常，且不適合含鉑化學治療之局部晚期或轉移性非小細胞肺癌成人病人。\\n2. 三陰性乳癌：與nab-paclitaxel併用，適用於治療無法切除之局部晚期或轉移性三陰性乳癌，且腫瘤具PD-L1表現(tumor-infiltrating immune cells (IC) ≥ 1%)且未曾接受化療用於轉移性乳癌之病人。\\n3. 小細胞肺癌：\\n(1) 與carboplatin 和etoposide 併用，適用於第一線治療成人擴散期小細胞肺癌(extensive stage small cell lung cancer)。\\n(2) 與lurbinectedin併用，適用於接受atezolizumab、carboplatin和etoposide作為第一線誘導治療後，疾病未惡化之擴散期小細胞肺癌(ES-SCLC)成人病人的維持治療。\\n4. 肝細胞癌：與bevacizumab併用，適用於治療未曾接受全身性療法且無法切除或轉移之肝細胞癌病人，且肝功能為Child-Pugh A。\\n5. 肺泡狀軟組織肉瘤：單獨使用，適用於治療2歲以上無法切除或轉移性肺泡狀軟組織肉瘤 (alveolar soft part sarcoma)病人。\", \"dosage\": \"詳見仿單。\", \"dosage_form\": \"注射液劑\", \"effective_until\": \"2027/07/17\", \"raw_ingredients\": [\"Atezolizumab\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌：\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌：\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌：\"}, {\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \" ame\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(5) 單獨使用，適用於第一線治療成人之轉移性、不具有EGFR或ALK腫瘤基因異常，且腫瘤具PD-L1高表現(tumor cells (TC) ≥ 50%或tumor infiltrating immune cells (IC) ≥10%)之非小細胞肺癌\"}, {\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(6) 單獨使用，適用於第一線治療不具有EGFR 或ALK 腫瘤基因異常，且不適合含鉑化學治療之局部晚期或轉移性非小細胞肺癌成人病人\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(6) 單獨使用，適用於第一線治療不具有EGFR 或ALK 腫瘤基因異常，且不適合含鉑化學治療之局部晚期或轉移性非小細胞肺癌成人病人\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(6) 單獨使用，適用於第一線治療不具有EGFR 或ALK 腫瘤基因異常，且不適合含鉑化學治療之局部晚期或轉移性非小細胞肺癌成人病人\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"小細胞肺癌：\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"小細胞肺癌：\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"small cell lung cancer\", \"match_kind\": \"direct_indication\", \"source_text\": \"(1) 與carboplatin 和etoposide 併用，適用於第一線治療成人擴散期小細胞肺癌(extensive stage small cell lung cancer)\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"lung cancer\", \"match_kind\": \"direct_indication\", \"source_text\": \"(1) 與carboplatin 和etoposide 併用，適用於第一線治療成人擴散期小細胞肺癌(extensive stage small cell lung cancer)\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"SCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"(2) 與lurbinectedin併用，適用於接受atezolizumab、carboplatin和etoposide作為第一線誘導治療後，疾病未惡化之擴散期小細胞肺癌(ES-SCLC)成人病人的維持治療\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(2) 與lurbinectedin併用，適用於接受atezolizumab、carboplatin和etoposide作為第一線誘導治療後，疾病未惡化之擴散期小細胞肺癌(ES-SCLC)成人病人的維持治療\"}]}, {\"permit\": \"衛部菌疫輸字第001258號\", \"chinese_name\": \"癌自禦皮下注射劑\", \"english_name\": \"Tecentriq Solution for Subcutaneous Injection\", \"indication\": \"1. 非小細胞肺癌：\\n(1) 單獨使用，適用於第II至IIIA期(UICC/AJCC分期系統第7版)且腫瘤具PD-L1表現(tumor cell (TC) ≥ 1%)之非小細胞肺癌病人接受手術切除及含鉑藥物化學治療後的輔助性治療。\\n(2) 單獨使用，適用於治療接受含鉑化學治療後，疾病惡化之局部晚期或轉移性非小細胞肺癌病人。病人若具有EGFR或ALK腫瘤基因異常，則須先經EGFR或ALK抑制劑治療，若治療後疾病惡化方可使用本品。\\n(3) 與bevacizumab、paclitaxel和carboplatin併用，做為轉移性之非鱗狀非小細胞肺癌的第一線治療藥物。病人若具有 EGFR 突變或 ALK 呈陽性者，則須先經適當的標靶藥物治療，若治療後疾病惡化方可與bevacizumab、paclitaxel 和carboplatin併用治療。\\n(4) 與nab-paclitaxel和carboplatin併用，做為轉移性，不具EGFR或ALK腫瘤基因異常之非鱗狀非小細胞肺癌的第一線治療。\\n(5) 單獨使用，適用於第一線治療成人之轉移性、不具有EGFR或ALK腫瘤基因異常，且腫瘤具PD-L1高表現(tumor cells (TC) ≥ 50%或tumor infiltrating immune cells (IC) ≥10%)之非小細胞肺癌。\\n(6) 單獨使用，適用於第一線治療不具有EGFR 或ALK 腫瘤基因異常，且不適合含鉑化學治療之局部晚期或轉移性非小細胞肺癌成人病人。\\n2. 三陰性乳癌：與nab-paclitaxel併用，適用於治療無法切除之局部晚期或轉移性三陰性乳癌，且腫瘤具PD-L1表現(tumor-infiltrating immune cells (IC) ≥ 1%)且未曾接受化療用於轉移性乳癌之病人。\\n3. 小細胞肺癌：\\n(1) 與carboplatin 和etoposide 併用，適用於第一線治療成人擴散期小細胞肺癌(extensive stage small cell lung cancer)。\\n(2) 與lurbinectedin併用，適用於接受atezolizumab、carboplatin和etoposide作為第一線誘導治療後，疾病未惡化之擴散期小細胞肺癌(ES-SCLC)成人病人的維持治療。\\n4. 肝細胞癌：與bevacizumab併用，適用於治療未曾接受全身性療法且無法切除或轉移之肝細胞癌病人，且肝功能為Child-Pugh A。\\n5. 肺泡狀軟組織肉瘤：單獨使用，適用於治療2歲以上無法切除或轉移性肺泡狀軟組織肉瘤 (alveolar soft part sarcoma)病人。\", \"dosage\": \"請詳見仿單\", \"dosage_form\": \"皮下注射劑\", \"effective_until\": \"2029/05/29\", \"raw_ingredients\": [\"Atezolizumab\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌：\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌：\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌：\"}, {\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(1) 單獨使用，適用於第II至IIIA期(UICC/AJCC分期系統第7版)且腫瘤具PD-L1表現(tumor cell (TC) ≥ 1%)之非小細胞肺癌病人接受手術切除及含鉑藥物化學治療後的輔助性治療\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(1) 單獨使用，適用於第II至IIIA期(UICC/AJCC分期系統第7版)且腫瘤具PD-L1表現(tumor cell (TC) ≥ 1%)之非小細胞肺癌病人接受手術切除及含鉑藥物化學治療後的輔助性治療\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"(1) 單獨使用，適用於第II至IIIA期(UICC/AJCC分期系統第7版)且腫瘤具PD-L1表現(tumor cell (TC) ≥ 1%)之非小細胞肺癌病人接受手術切除及含鉑藥物化學治療後的輔助性治療\"}, {\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_ 氣喘病人必須有經由皮膚測試或體外試驗顯示長期對空氣中過敏原呈陽性且肺功能降低 (FEV1 < 80%)。僅適用於證實為IgE媒介型之氣喘病人。\\r\\n2.慢性鼻竇炎併鼻息肉附加療法：\\r\\n適用於對鼻腔內皮質類固醇製劑治療無法達到適當的疾病控制之慢性鼻竇炎併鼻息肉成人(18歲以上)病人作為附加療法。\\r\\n適用於病人血清IgE濃度有相對應建議的投與劑量。\\r\\n3.慢性自發性蕁麻疹(Chronic Spontaneous Urticaria, CSU) 附加療法：\\r\\n適用於治療對H1抗組織胺製劑治療反應不佳之慢性自發性蕁麻疹成人及青少年(12歲及以上)病人作為附加療法。\", \"dosage\": \"詳如仿單\", \"dosage_form\": \"凍晶注射劑\", \"effective_until\": \"2027/04/09\", \"raw_ingredients\": [\"OMALIZUMAB\"], \"topics\": [\"呼吸道藥物\"], \"topic_evidence\": [{\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"1.過敏性氣喘附加療法：\"}, {\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"為附加療法用於改善已接受高劑量吸入性類固醇製劑及長效乙二型作用劑(ß2-agonist)治療下仍有頻繁之日間症狀或夜間覺醒且具有多次重度氣喘惡化記錄之重度持續過敏性氣喘成人、青少年及兒童(6歲及以上) 病人之氣喘控制\"}, {\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"這些氣喘病人必須有經由皮膚測試或體外試驗顯示長期對空氣中過敏原呈陽性且肺功能降低 (FEV1 < 80%)\"}, {\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"僅適用於證實為IgE媒介型之氣喘病人\"}]}, {\"permit\": \"衛部菌疫輸字第001062號\", \"chinese_name\": \"喜瑞樂注射液劑150毫克/毫升\", \"english_name\": \"Xolair 150mg/mL Solution for Injection\", \"indication\": \"1.過敏性氣喘附加療法：為附加療法用於改善已接受高劑量吸入性類固醇製劑及長效乙二型作用劑(s2-  agonist) 治療下仍有頻繁之日間症狀或夜間覺醒且具有多次重度氣喘惡化紀錄之重度持續過敏性氣喘成人、青少年及兒童(6 歲及以上) 病人之氣喘控制。這些氣喘病人必須有經由皮膚測試或體外試驗顯示長期對空氣中過敏原呈陽性且肺功能降低(FEV1 < 80%)。僅適用於證實為IgE 媒介型之氣喘病人。  2.慢性鼻竇炎併鼻息肉附加療法:  適用於對鼻腔內皮質類固醇製劑治療無法達到適當的疾病控制之慢性鼻竇炎併鼻息肉成人(18 歲以上) 病人作為附加療法。適用於病人血清IgE 濃度有相對應建議的投與劑量。  3.慢性自發性蕁麻疹(Chronic Spontaneous Urticaria, CSU) 附加療法:  適用於治療對H1 抗組織胺製劑治療反應不佳之慢性自發性蕁麻疹成人及青少年(12歲及以上) 病人作為附加療法。\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"注射液劑\", \"effective_until\": \"2027/09/13\", \"raw_ingredients\": [\"OMALIZUMAB\"], \"topics\": [\"呼吸道藥物\"], \"topic_evidence\": [{\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"1.過敏性氣喘附加療法：為附加療法用於改善已接受高劑量吸入性類固醇製劑及長效乙二型作用劑(s2-  agonist) 治療下仍有頻繁之日間症狀或夜間覺醒且具有多次重度氣喘惡化紀錄之重度持續過敏性氣喘成人、青少年及兒童(6 歲及以上) 病人之氣喘控制\"}, {\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"這些氣喘病人必須有經由皮膚測試或體外試驗顯示長期對空氣中過敏原呈陽性且肺功能降低(FEV1 < 80%)\"}, {\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"僅適用於證實為IgE 媒介型之氣喘病人\"}]}, {\"permit\": \"衛部菌疫輸字第001316號\", \"chinese_name\": \"休敏樂注射液劑150毫克/毫升\", \"english_name\": \"Omlyclo soluiton for injection\", \"indication\": \"1.\\t過敏性氣喘附加療法：為附加療法用於改善已接受高劑量吸入性類固醇製劑及長效乙二型作用劑(ß2- agonist) 治療下仍有頻繁之日間症狀或夜間覺醒且具有多次重度氣喘惡化紀錄之重度持續過敏性氣喘成人、青少年及兒童(6 歲及以上)病人之氣喘控制。這些氣喘病人必須有經由皮膚測試或體外試驗顯示長期對空氣中過敏原呈陽性且肺功能降低(FEV1 < 80%)。僅適用於證實為IgE 媒介型之氣喘病人。\\n2.\\t慢性鼻竇炎併鼻息肉附加療法：適用於對鼻腔內皮質類固醇製劑治療無法達到適當的疾病控制之慢性鼻竇炎併鼻息肉成人(18 歲以上) 病人作為附加療法。適用於病人血清IgE 濃度有相對應建議的投與劑量。\\n3.\\t慢性自發性蕁麻疹(Chronic Spontaneous Urticaria, CSU) 附加療法：適用於治療對H1 抗組織胺製劑治療反應不佳之慢性自發性蕁麻疹成人及青少年(12歲及以上) 病人作為附加療法。\", \"dosage\": \"詳如仿單\", \"dosage_form\": \"注射液劑\", \"effective_until\": \"2031/03/11\", \"raw_ingredients\": [\"OMALIZUMAB\"], \"topics\": [\"呼吸道藥物\"], \"topic_evidence\": [{\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"過敏性氣喘附加療法：為附加療法用於改善已接受高劑量吸入性類固醇製劑及長效乙二型作用劑(ß2- agonist) 治療下仍有頻繁之日間症狀或夜間覺醒且具有多次重度氣喘惡化 d\": \"direct_indication\", \"source_text\": \"治療轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤帶有導致間質上皮轉化因子外顯子14跳讀式突變(MET exon 14 skipping mutation)\"}]}, {\"permit\": \"衛部藥輸字第028097號\", \"chinese_name\": \"泰芮塔200毫克膜衣錠\", \"english_name\": \"Tabrecta 200mg Film Coated Tablets\", \"indication\": \"治療轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤帶有導致間質上皮轉化因子外顯子14跳讀式突變(MET exon 14 skipping mutation)。\", \"dosage\": \"詳見中文仿單擬稿。\", \"dosage_form\": \"膜衣錠\", \"effective_until\": \"2031/06/17\", \"raw_ingredients\": [\"Capmatinib dihydrochloride monohydrate\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"NSCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"治療轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤帶有導致間質上皮轉化因子外顯子14跳讀式突變(MET exon 14 skipping mutation)\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"治療轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤帶有導致間質上皮轉化因子外顯子14跳讀式突變(MET exon 14 skipping mutation)\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"治療轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤帶有導致間質上皮轉化因子外顯子14跳讀式突變(MET exon 14 skipping mutation)\"}]}]"}, {"key": "TRASTUZUMAB DERUXTECAN", "text": "TRASTUZUMAB DERUXTECAN FAM-TRASTUZUMAB DERUXTECAN-NXKI [\"Enhertu\"] [{\"permit\": \"衛部菌疫輸字第001179號\", \"chinese_name\": \"優赫得凍晶注射劑100毫克\", \"english_name\": \"ENHERTU 100 mg powder for concentrate for solution for infusion\", \"indication\": \"一、\\t轉移性乳癌(BC)\\n1.\\tHER2陽性：\\n(1) 與pertuzumab合併使用於無法切除或轉移性HER2陽性(IHC 3+或ISH陽性)乳癌的成人病人，以作為第一線治療。\\n(2) 單獨使用於具有無法切除或轉移性HER2陽性乳癌(IHC 3+或ISH陽性)，且曾於以下狀況接受過抗HER2療程的成人病人：\\n甲、轉移性癌症治療；或\\n乙、術前或術後輔助治療，且於治療期間或完成治療後6個月內癌症復發。\\n2.\\tHER2弱陽性(HER2-Low)和HER2微陽性(HER2-Ultralow)：\\n(1)\\t單獨使用於具有無法切除或轉移性荷爾蒙受體(HR)陽性、HER2弱陽性(IHC 1+或IHC 2+/ISH-)或HER2微陽性(IHC 0且有細胞膜染色)乳癌，在轉移情況下至少接受過一次荷爾蒙療法且認為不適合接受荷爾蒙療法作為下一線治療的成人病人。\\n(2)\\t單獨使用於具有無法切除或轉移性HER2弱陽性(IHC 1+或IHC 2+/ISH-)乳癌，且曾接受過針對轉移性乳癌之化學療法，或在進行輔助化療(adjuvant chemotherapy)期間或完成輔助化療後6個月內癌症復發的成人病人。\\n二、\\t無法切除或轉移性非小細胞肺癌(NSCLC)：單獨使用於具有無法切除或轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤具有活化型HER2(ERBB2)突變，且先前曾接受過全身性治療。\\n三、\\t局部晚期或轉移性胃癌(GC)：單獨使用於先前曾接受過trastuzumab療程的局部晚期或轉移性HER2陽性(IHC3+ 或IHC 2+/ISH陽性)胃癌或胃食道接合處(GEJ)腺癌成人病人。\\n四、\\t其他無法切除或轉移性實體腫瘤(solid tumors)：單獨使用於具有無法切除或轉移性HER2陽性(IHC 3+)實體腫瘤，先前曾接受過全身性治療且無其他適當替代治療選項的成人病人。\", \"dosage\": \"詳見仿單。\", \"dosage_form\": \"凍晶注射劑\", \"effective_until\": \"2026/12/07\", \"raw_ingredients\": [\"trastuzumab deruxtecan\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"NSCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"二、\\t無法切除或轉移性非小細胞肺癌(NSCLC)：單獨使用於具有無法切除或轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤具有活化型HER2(ERBB2)突變，且先前曾接受過全身性治療\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"二、\\t無法切除或轉移性非小細胞肺癌(NSCLC)：單獨使用於具有無法切除或轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤具有活化型HER2(ERBB2)突變，且先前曾接受過全身性治療\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"二、\\t無法切除或轉移性非小細胞肺癌(NSCLC)：單獨使用於具有無法切除或轉移性非小細胞肺癌(NSCLC)的成人病人，其腫瘤具有活化型HER2(ERBB2)突變，且先前曾接受過全身性治療\"}]}] 優赫得凍晶注射劑100毫克 ENHERTU 100 mg powder for concentrate for solution for infusion KC01179255"}, {"key": "TOPOTECAN", "text": "TOPOTECAN TOPOTECAN [\"HYCAMTIN\", \"Topotecan\", \"Topotecan Hydrochloride\", \"Topotecan hydrochloride\", \"topotecan hydrochloride\"] [{\"permit\": \"衛署藥輸字第022449號\", \"chinese_name\": \"癌康定注射劑\", \"english_ \"KOJAR\" AC31825100 \"國嘉\" 倍嘉松錠0.6毫克(貝皮質醇) BECASONE TABLETS 0.6MG (BETAMETHASONE) \"KOJAR\" AC318251G0 \"永勝\"寧達隆錠０．５公絲（貝皮質醇） RINDARON TABLETS 0.5MG (BETAMETHASONE) \"EVEREST\" AC39305100 \"十全\" 倍達錠 BEDASON TABLETS \"S.C.\" AC45311100 臨得隆錠 RINDERON TABLETS AC45967100 \"羅得\" 倍他沒酸錠 NORHEUM TABLETS \"ROOT\" AC47045100 \"麥迪森\"倍特明眼藥水0.1％ Betame eye drops 0.1％ \"MEDICINE\" (Betamethasone sodium phosphate) AC57832421 倍舒炎滴眼液 Besoen Eye Drops AC61094421 倍舒炎滴眼液 Besoen Eye Drops AC61094429"}, {"key": "BEVACIZUMAB", "text": "BEVACIZUMAB BEVACIZUMAB-AWWB [\"ALYMSYS\", \"Avastin\", \"JOBEVNE\", \"MVASI\", \"Vegzelma\", \"Zirabev\"] [{\"permit\": \"衛署菌疫輸字第000807號\", \"chinese_name\": \"癌思停 注射劑\", \"english_name\": \"AVASTIN INJECTION\", \"indication\": \"1. 轉移性大腸直腸癌 (mCRC)：\\r\\nAvastin (bevacizumab) 與含有5-fluorouracil為基礎的化學療法合併使用，可以作為轉移性大腸或直腸癌病人的第一線治療。\\r\\nAvastin與含有5-fluorouracil/leucovorin/oxaliplatin的化學療法合併使用，可以作為先前接受過以fluoropyrimidine為基礎的化學療法無效且未曾接受過Avastin治療的轉移性大腸或直腸癌病人的治療。\\r\\nAvastin (bevacizumab) 與含有fluoropyrimidine-irinotecan-或fluoropyrimidine-oxaliplatin-為基礎的化學療法合併使用，可以做為第一線已接受過以Avastin併用化療後惡化之轉移性大腸或直腸癌病人的第二線治療。\\r\\n2. 轉移性乳癌 (mBC)：\\r\\nAvastin與paclitaxel合併使用，可以做為HER2 (-) 轉移性乳癌病人的第一線治療。\\r\\n3. 惡性神經膠質瘤（WHO第4級）-神經膠母細胞瘤：\\r\\nAvastin單獨使用可用於治療曾接受標準放射線治療且含temozolomide在內之化學藥物治療失敗之多型性神經膠母細胞瘤 (Glioblastoma multiforme) 復發之成人病人。\\r\\n4. 晚期、轉移性或復發性非鱗狀非小細胞肺癌 (NSCLC)：\\r\\nAvastin與carboplatin及paclitaxel合併使用，可以作為無法切除的晚期、轉移性或復發性非鱗狀非小細胞肺癌病人的第一線治療。\\r\\nAvastin併用erlotinib，可作為無法手術切除的晚期、轉移性或復發性且帶有表皮生長因子受體 (EGFR) 活化性突變的非鱗狀非小細胞肺癌病人的第一線治療。\\r\\n5. 卵巢上皮細胞、輸卵管或原發性腹膜癌 (Epithelial Ovarian, Fallopian Tube or Primary Peritoneal Cancer)：\\r\\nAvastin與carboplatin及paclitaxel合併使用，接著單獨使用Avastin，可以做為第三期或第四期卵巢上皮細胞、輸卵管或原發性腹膜癌病人接受初次手術切除後之治療。\\r\\nAvastin與carboplatin及gemcitabine合併使用，可以做為曾接受過第一線含鉑類藥物 (platinum-based) 化學治療間隔至少6個月再復發（即，對含鉑藥物具感受性），且未曾接受過bevacizumab或其他血管內皮細胞生長因子 (VEGF) 抑制劑或血管內皮細胞生長因子接受器之標靶藥物 (VEGF receptor-targeted agents) 治療之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。\\r\\nAvastin與carboplatin及paclitaxel合併使用，接著單獨使用Avastin治療，可以做為對含鉑藥物具感受性之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。\\r\\nAvastin併用paclitaxel、topotecan或pegylated liposomal doxorubicin可以做為接受過含鉑類藥物 (platinum-based) 化療治療後6個月內再復發（即，對含鉑藥物具抗藥性）、之前接受不超過2種化療療程且未曾接受過bevacizumab或其他血管內皮細胞生長因子 (VEGF) 抑制劑或血管內皮細胞生長因子接受器之標靶藥物 (VEGF receptor-targeted agents) 之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。\\r\\n6. 持續性、復發性或轉移性之子宮頸癌 (Persistent, Recurrent, or Metastatic Cervical Cancer)：\\r\\nAvastin與paclitaxel及cisplatin合併使用可用於治療持續性、復發性或轉移性之子宮頸癌。Avastin與paclitaxel及topotecan合併使用可用於無法接受含鉑類藥物治療 (platinum therapy) 病人之持續性、復發性或轉移性子宮頸癌。\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"注射劑\", \"effective_until\": \"2030/05/24\", \"raw_ingredients\": [\"BEVACIZUMAB\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"NSCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"晚期、轉移性或復發性非鱗狀非小細胞肺癌 (NSCLC)：\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"晚期、轉移性或復發性非鱗狀非小細胞肺癌 (NSCLC)：\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"晚期、轉移性或復發性非鱗狀非小細胞肺癌 (NSCLC)：\"}, {\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"Avastin與carboplatin及paclitaxel合併使用，可以作為無法切除的晚期、轉移性或復發性非鱗狀非小細胞肺癌病人的第一線治療\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"Avastin與carboplatin及paclitaxel合併使用，可以作為無法切除的晚期、轉移性或復發性非鱗狀非小細胞肺癌病人的第一線治療\" ersistent, Recurrent, or Metastatic Cervical Cancer)：(1)與paclitaxel及cisplatin合併使用可用於治療持續性、復發性或轉移性之子宮頸癌。(2)與paclitaxel及topotecan合併使用可用於無法接受含鉑類藥物治療(platinum therapy)病人之持續性、復發性或轉移性子宮頸癌。\\r\\n6.卵巢上皮細胞、輸管或原發性腹膜癌(Epithelial Ovarian, Fallopian Tube or Primary Peritoneal Cancer)：(1)與carboplatin及paclitaxel合併使用，接著單獨使用MVASI，可以做為第三期或第四期卵巢上皮細胞、輸卵管或原發性腹膜癌病人接受初次手術切除後之治療。(2)與carboplatin及gemcitabine合併使用，可以做為曾接受過第一線含鉑類藥物(platinum-based)化學治療間隔至少6個月再復發（即，對含鉑藥物具感受性），且未曾接受過bevacizumab或其他血管內皮細胞生長因子(VEGF)抑制劑或血管內皮細胞生長因子接受器之標靶藥物(VEGF receptor-targeted agents)治療之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。(3)與carboplatin及paclitaxel合併使用，接著單獨使用MVASI治療，可以做為對含鉑藥物具感受性之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。(4)併用paclitaxel、topotecan或pegylated liposomal doxorubicin可以做為接受過含鉑類藥物(platinum-based)化療治療後6個月內再復發（即，對含鉑藥物具抗藥性）、之前接受不超過2種化療療程且未曾接受過bevacizumab或其他血管內皮細胞生長因子(VEGF)抑制劑或血管內皮細胞生長因子接受器之標靶藥物(VEGF receptor-targeted agents)之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"注射液劑\", \"effective_until\": \"2029/12/17\", \"raw_ingredients\": [\"BEVACIZUMAB\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"NSCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"4.晚期、轉移性或復發性非鱗狀非小細胞肺癌(NSCLC)：(1)與carboplatin及paclitaxel合併使用，可以作為無法切除的晚期、轉移性或復發性非鱗狀非小細胞肺癌病人的第一線治療\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"4.晚期、轉移性或復發性非鱗狀非小細胞肺癌(NSCLC)：(1)與carboplatin及paclitaxel合併使用，可以作為無法切除的晚期、轉移性或復發性非鱗狀非小細胞肺癌病人的第一線治療\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"4.晚期、轉移性或復發性非鱗狀非小細胞肺癌(NSCLC)：(1)與carboplatin及paclitaxel合併使用，可以作為無法切除的晚期、轉移性或復發性非鱗狀非小細胞肺癌病人的第一線治療\"}, {\"concep ，可以做為第一線已接受過Vegzelma 併用化療後惡化之轉移性大腸或直腸癌病人的第二線治療。\\r\\n轉移性乳癌(mBC) \\r\\n與paclitaxel合併使用，可以做為HER2 (-)轉移性乳癌病人的第一線治療。\\r\\n惡性神經膠質瘤(WHO第4級)-神經膠母細胞瘤\\r\\n單獨使用可用於治療曾接受標準放射線治療且含Temozolomide 在內之化學藥物治療失敗之多型性神經膠母細胞瘤(Glioblastoma multiforme)復發之成人病人。\\r\\n晚期、轉移性或復發性非鱗狀非小細胞肺癌(NSCLC)\\r\\n與carboplatin及paclitaxel合併使用，可以作為無法切除的晚期、轉移性或復發性非鱗狀非小細胞肺癌病人的第一線治療。\\r\\n併用erlotinib，可作為無法手術切除的晚期、轉移性或復發性且帶有表皮生長因子受體(EGFR)活化性突變的非鱗狀非小細胞肺癌病人的第一線治療。\\r\\n卵巢上皮細胞、輸卵管或原發性腹膜癌(Epithelial Ovarian, Fallopian Tube or Primary Peritoneal Cancer)\\r\\n與carboplatin及paclitaxel合併使用，接著單獨使用Vegzelma，可以做為第三期或第四期卵巢上皮細胞、輸卵管或原發性腹膜癌病人接受初次手術切除後之治療。\\r\\n與carboplatin及gemcitabine合併使用，可以做為曾接受過第一線含鉑類藥物(Platinum-based) 化學治療間隔至少6個月再復發 (即，對含鉑藥物具感受性)，且未曾接受過bevacizumab或其他血管內皮細胞生長因子 (VEGF) 抑制劑或血管內皮細胞生長因子接受器之標靶藥物 (VEGF receptor-targeted agents) 治療之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。\\r\\n與carboplatin及paclitaxel合併使用，接著單獨使用Vegzelma治療，可以做為對含鉑藥物具感受性之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。\\r\\n併用paclitaxel、topotecan或pegylated liposomal doxorubicin可以做為接受過含鉑類藥物 (platinum-based)化療治療後6個月內再復發(即，對含鉑藥物具抗藥性)、之前接受不超過2種化療療程且未曾接受過bevacizumab或其他血管內皮細胞生長因子(VEGF)抑制劑或血管內皮細胞生長因子接受器之標靶藥物(VEGF receptor-targeted agents)之復發性卵巢上皮細胞、輸卵管或原發性腹膜癌病人的治療。\\r\\n持續性、復發性或轉移性之子宮頸癌(Persistent, Recurrent, or Metastatic Cervical Cancer)\\r\\n與paclitaxel及cisplatin合併使用可用於治療持續性、復發性或轉移性之子宮頸癌。與paclitaxel及topotecan合併使用可用於無法接受含鉑類藥物治療(platinum therapy)病人之持續性、復發性或轉移性子宮頸癌。\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"注射液劑\", \"effective_until\": \"2029/01/09\", \"raw_ingredients\": [\"BEVACIZUMAB\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"NSCLC\", \"match_kind\": \"direct_indication\", \"source_text\": \"晚期、轉移性或復發性非鱗狀非小細胞肺癌(NSCLC)\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"晚期、轉移性或復發性非鱗狀非小細胞肺癌( . 非小細胞肺癌: Dabrafenib 與trametinib 併用，可用於治療BRAF V600 突變之晚期非小細胞肺癌成人病人。\\r\\n4. BRAF V600E突變陽性且無法切除或轉移性實體腫瘤：Trametinib與dabrafenib併用，可用於治療BRAF V600E突變之無法切除或轉移性實體腫瘤的6歲以上兒童及成人病人，前述病人於先前治療後出現惡化現象且無任何其他適當替代治療選擇。使用限制：Trametinib不可用於治療結腸直腸癌病人，因為這類病人已知對BRAF抑制作用具先天抗藥性。\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"膜衣錠\", \"effective_until\": \"2031/07/05\", \"raw_ingredients\": [\"Trametinib Dimethyl Sulfoxide\"], \"topics\": [\"肺癌\"], \"topic_evidence\": [{\"concept_id\": \"nsclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Non-Small Cell Lung Cancer\", \"mesh_id\": \"D002289\", \"matched_term\": \"非小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌: Dabrafenib 與trametinib 併用，可用於治療BRAF V600 突變之晚期非小細胞肺癌成人病人\"}, {\"concept_id\": \"sclc\", \"topic\": \"肺癌\", \"preferred_name\": \"Small Cell Lung Cancer\", \"mesh_id\": \"D018288\", \"matched_term\": \"小細胞肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌: Dabrafenib 與trametinib 併用，可用於治療BRAF V600 突變之晚期非小細胞肺癌成人病人\"}, {\"concept_id\": \"lung_cancer\", \"topic\": \"肺癌\", \"preferred_name\": \"Lung Neoplasms\", \"mesh_id\": \"D008175\", \"matched_term\": \"肺癌\", \"match_kind\": \"direct_indication\", \"source_text\": \"非小細胞肺癌: Dabrafenib 與trametinib 併用，可用於治療BRAF V600 突變之晚期非小細胞肺癌成人病人\"}]}, {\"permit\": \"衛部藥輸字第026818號\", \"chinese_name\": \"麥欣霓膜衣錠2毫克\", \"english_name\": \"Mekinist Film-Coated Tablets 2mg\", \"indication\": \"1. 黑色素瘤: Trametinib 單一療法或與dabrafenib 併用，可用於治療罹患發生BRAF V600突變且無法切除或有轉移現象之成人性黑色素瘤( 請參閱第4.4 節和第5.1 節)。在先前接受BRAF 抑制劑療法時惡化的病人中，trametinib 單一療法並未展現出臨床活性( 請參閱第5.1 節)。\\r\\n2. 黑色素瘤的輔助治療: Trametinib 與dabrafenib 併用，可用於治療BRAF V600 突變且經完全切除後之第III 期黑色素瘤病人的術後輔助治療。\\r\\n3. 非小細胞肺癌: Dabrafenib 與trametinib 併用，可用於治療BRAF V600 突變之晚期非小細胞肺癌成人病人。\\r\\n4.BRAF V600E突變陽性且無法切除或轉移性實體腫瘤：Trametinib與dabrafenib併用，可用於治療BRAF V600E突變之無法切除或轉移性實體腫瘤的6歲以上兒童及成人病人，前述病人於先前治療後出現惡化現象且無任何其他適當替代治療選擇。\\r\\n使用限制：Trametinib不可用於治療結腸直腸癌病人，因為這類病人已知對BRAF抑制作用具先天抗藥性。\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"膜衣錠\", \"effective_unt  \"chinese_name\": \"杜避炎注射劑300毫克\", \"english_name\": \"Dupixent solution for injection 300mg\", \"indication\": \"1. 異位性皮膚炎：可用於治療患有中度至重度異位性皮膚炎且對局部處方治療控制不佳或不適合使用該療法的成人病人及6個月以上的兒童病人。可併用或不併用局部皮質類固醇治療。\\n２.氣喘：可作為6歲以上患有嗜伊紅性白血球表現型或口服皮質類固醇依賴型之中度至重度氣喘病人，在已接受中劑量或高劑量吸入性皮質類固醇(ICS)及第2種控制藥物(如，LABA, LTRA, LAMA或methylxanthines)治療，或單獨接受高劑量ICS治療，仍有氣喘控制不佳現象時的附加維持治療(add-on maintenance therapy)。\\n３.慢性鼻竇炎合併鼻息肉：可作為患有慢性鼻竇炎合併鼻息肉(CRSwNP)之成人病人在鼻內皮質類固醇治療下仍控制不佳的附加維持治療(add-on maintenance therapy)。\\n４. 結節性癢疹：可用於需全身性治療的中至重度結節性癢疹(PN)成人病人。\\n５.嗜伊紅性食道炎：可用於治療1歲以上且體重至少達15公斤之嗜伊紅性食道炎(EoE)病人。\\n６.慢性阻塞性肺病：可作為患有控制不佳之嗜伊紅性白血球表現型慢性阻塞性肺病(COPD)成人病人的附加維持治療(add-on maintenance therapy)。\\n７.慢性自發性蕁麻疹：可用於治療患有慢性自發性蕁麻疹 （chronic spontaneous urticaria， CSU） 且無法以 H1 抗組織胺治療妥善控制的12 歲以上病人。\", \"dosage\": \"詳見仿單\", \"dosage_form\": \"預充填式注射劑\", \"effective_until\": \"2028/05/10\", \"raw_ingredients\": [\"dupilumab\"], \"topics\": [\"呼吸道藥物\"], \"topic_evidence\": [{\"concept_id\": \"asthma\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Asthma\", \"mesh_id\": \"D001249\", \"matched_term\": \"氣喘\", \"match_kind\": \"direct_indication\", \"source_text\": \"２.氣喘：可作為6歲以上患有嗜伊紅性白血球表現型或口服皮質類固醇依賴型之中度至重度氣喘病人，在已接受中劑量或高劑量吸入性皮質類固醇(ICS)及第2種控制藥物(如，LABA, LTRA, LAMA或methylxanthines)治療，或單獨接受高劑量ICS治療，仍有氣喘控制不佳現象時的附加維持治療(add-on maintenance therapy)\"}, {\"concept_id\": \"copd\", \"topic\": \"呼吸道藥物\", \"preferred_name\": \"Chronic Obstructive Pulmonary Disease\", \"mesh_id\": \"D029424\", \"matched_term\": \"COPD\", \"match_kind\": \"direct_indication\", \"source_text\": \"６.慢性阻塞性肺病：可作為患有控制不佳之嗜伊紅性白血球表現型慢性阻塞性肺病(COPD)成人病人的附加維持治療(add-on maintenance therapy)\"}]}, {\"permit\": \"衛部菌疫輸字第001133號\", \"chinese_name\": \"杜避炎注射劑200毫克\", \"english_name\": \"Dupixent solution for injection 200mg\", \"indication\": \"1. 異位性皮膚炎：可用於治療患有中度至重度異位性皮膚炎且對局部處方治療控制不佳或不適合使用該療法的成人病人及6個月以上的兒童病人。可併用或不併用局部皮質類固醇治療。 2. 氣喘：可作為6歲以上患有嗜伊紅性白血球表現型或口服皮質類固醇依賴型之中度至重度氣喘病人，在已接受中劑量或高劑量吸入性皮質類固醇(ICS)及第2種控制藥物(如，LABA, LTRA, LAMA或methylxanthines)治療，或單獨接受高劑量ICS治療，仍有氣喘控制不佳現象時的附加維持治療(add-on ma function searchDrug(e){e.preventDefault();let q=document.querySelector('#drugSearch').value.trim().toLocaleLowerCase();let rows=(D.search_index||[]).filter(x=>x.text.toLocaleLowerCase().includes(q));if(rows.length===1){location.hash='drug/'+encodeURIComponent(rows[0].key);return}app.innerHTML=`<button class="back" onclick="location.hash=''">← 首頁</button><h1>搜尋結果</h1><p>找到 ${rows.length} 種成分</p><div class="grid">${rows.map(x=>`<a class="card" href="#drug/${encodeURIComponent(x.key)}"><h3>${esc(x.key)}</h3><b>開啟藥品整合頁 →</b></a>`).join('')||'<p>找不到符合的藥品，請改用部分名稱搜尋。</p>'}</div>`}

function nhi(x){let regs=x.regulations||[];let cards=regs.map(r=>{let badges=r.cross_source_mismatch?'<span class="badge warn">ODT／PDF 版本或內容不一致</span>':(r.coverage_complete?'<span class="badge ok">完整性檢查通過</span>':'<span class="badge warn">完整性尚未確認</span>');let summaries=r.publication_allowed?(r.summary_sections||[]).map(s=>`<details><summary>${esc(s.label)}（結構化摘要）</summary><ul>${(s.items||[]).map(v=>`<li>${esc(v)}</li>`).join('')}</ul></details>`).join(''):'';let clauses=(r.full_clauses||[]).map(v=>`<details open><summary>完整編號條文 ${esc(v.clause_id)}${clauseVersionLabel(v)}</summary>${v.display_text?`<pre>${esc(v.display_text)}</pre>`:'<p>來源文字層為空，請直接開啟官方檔案並人工覆核。</p>'}${v.show_source_text?`<details><summary>查看未修復換行的來源文字層</summary><pre>${esc(v.source_text)}</pre></details>`:''}</details>`).join('');return `<article><h3>條文 ${esc(r.clause)}</h3><p>${badges}</p><p><b>摘要狀態：</b>${esc(r.summary_state)}</p><p class="source-note">主要來源：${esc(r.primary_source_label)}${r.primary_url?`｜<a href="${esc(r.primary_url)}" target="_blank" rel="noopener">健保署主要來源檔 ↗</a>`:''}${r.url&&r.url!==r.primary_url?`｜<a href="${esc(r.url)}" target="_blank" rel="noopener">個別條文 PDF ↗</a>`:''}</p>${r.cross_source_mismatch?`<p class="error">${esc(r.mismatch_notes||'來源之間存在差異；個別 PDF 不可當作最新版。')}</p>`:''}${summaries}${clauses}<p class="source-note">完整來源文字優先於任何摘要；正式申報仍須核對健保署當期有效的完整章節 ODT。</p></article>`}).join('');return `<section class="panel"><h2>1. 台灣健保給付條件</h2>${manualLines(x,'nhi_conditions')}${cards||(!manual(x,'nhi_conditions').length?'<p>目前沒有對應給付條文；不以 FDA／TFDA 核准推定健保給付。</p>':'')}</section>`}
function changes(x){let versions=(x.regulations||[]).flatMap(r=>(r.full_clauses||[]).map(v=>{let upcoming=v.upcoming_revision||v.upcoming_effective_date;let current=v.current_version_date?`<span class="badge ok">現行條文版本</span> <b>${esc(v.current_version_date)}</b>`:'';let latest=v.latest_version_date&&v.latest_version_date!==v.current_version_date?`<span class="source-note">條文所載最新版本日期 ${esc(v.latest_version_date)}</span>`:'';let future=upcoming?`<span class="badge warn">已公告、尚未生效</span> <b>${esc(v.upcoming_effective_date||'生效日待確認')}</b>　${esc(v.upcoming_revision||'修訂內容待確認')}`:'';if(!current&&!future&&v.latest_version_date)current=`<span class="badge ok">條文內最新異動日</span> <b>${esc(v.latest_version_date)}</b>`;if(!current&&!latest&&!future)return'';return `<p><b>條文 ${esc(v.clause_id||r.clause)}</b>　${[current,latest,future].filter(Boolean).join('　')}</p>`})).filter(Boolean).join('');let rows=(x.changes||[]).map(r=>`<p><span class="badge ${r.change_kind==='new'?'ok':'warn'}">${r.change_kind==='new'?'新收載':'品項異動'}</span> <b>${esc(r.effective_date)}</b>　${esc(r.description)}（${esc(r.code)}）</p>`).join('');let empty=!versions&&!rows&&!manual(x,'nhi_changes').length?'<p>目前未偵測到本期品項或條文異動；仍以官方原文版本為準。</p>':'';return `<section class="panel"><h2>2. 台灣健保給付條件最新異動與異動時間</h2>${manualLines(x,'nhi_changes')}${versions?`<h3>給付條文版本</h3>${versions}`:''}${rows?`<h3>健保品項異動</h3>${rows}`:''}${empty}</section>`}
function administration(x){let a=x.administration||[];let table=a.length?`<p>FDA標籤自動擷取候選；未明載欄位不推測。</p><div style="overflow:auto"><table><tr><th>適應情境</th><th>幾天／多久一次</th><th>Dose</th><th>泡藥方式</th><th>輸注時間</th></tr>${a.map(r=>`<tr><td>${esc(r.context)}</td><td>${esc(r.frequency||'未明載')}</td><td>${esc(r.dose)}</td><td>${esc(r.diluent||(r.route==='PO'||r.route==='SC'?'不適用':'未明載'))}</td><td>${esc(r.infusion_time||(r.route==='PO'||r.route==='SC'?'不適用':'未明載'))}</td></tr>`).join('')}</table></div>`:(!manual(x,'administration_notes').length?'<p>尚未擷取到可靠給藥摘要，可由內容管理人工補正。</p>':'');return `<section class="panel"><h2>3. 簡潔給藥方式</h2>${manualLines(x,'administration_notes')}${table}</section>`}

function fda(x){let f=x.fda,body='';if(f)body=`${(x.indication_summary||[]).map(v=>`<p>${esc(v)}</p>`).join('')}${jsonList(f.indications_json).map(v=>`<details><summary>FDA完整適應症原文（核對用）</summary><pre>${esc(v)}</pre></details>`).join('')}`;else if(!manual(x,'fda_indications').length)body='<p>尚無對應 FDA 標籤資料。</p>';return `<section class="panel"><h2>6. FDA 核准適應症</h2>${manualLines(x,'fda_indications')}${body}</section>`}
function products(x){let rows=x.products||[];return `<section class="panel"><h2>7. 台灣健保品項</h2>${rows.length?`<div style="overflow:auto"><table><tr><th>健保碼</th><th>名稱</th><th>劑型</th><th>章節</th></tr>${rows.map(p=>`<tr><td><a href="${esc(p.drug_url)}">${esc(p.code)}</a></td><td>${esc(p.chinese_name)}</td><td>${esc(p.dosage_form)}</td><td>${esc(p.rule_chapters||'無專屬條文')}</td></tr>`).join('')}</table></div>`:'<p>目前沒有對應的有效台灣健保品項。</p>'}</section>`}
async function drug(key){let file=D.detail_files[key];if(!file)return home();app.innerHTML='<p>載入藥物資料中…</p>';let x;try{x=await fetch(file).then(r=>{if(!r.ok)throw Error(r.status);return r.json()})}catch(e){app.innerHTML='<p>資料載入失敗，請重新整理後再試。</p>';return}app.innerHTML=`<button class="back" onclick="history.back()">← 返回</button><section class="hero"><h1>${esc(key)}</h1></section>${nhi(x)}${changes(x)}${administration(x)}${safety(x)}${tfda(x)}${fda(x)}${products(x)}`}
function route(){let [a,b]=location.hash.slice(1).split('/');a==='topic'?topic(decodeURIComponent(b||'')):a==='drug'?drug(decodeURIComponent(b||'')):home()}addEventListener('hashchange',route);route();</script></body></html>
